# XcodeGen project spec for Pulse Insurance
# Run: xcodegen generate
# https://github.com/yonaskolb/XcodeGen

name: PulseInsurance
options:
  bundleIdPrefix: com.pulseinsurance
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

targets:
  PulseInsurance:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    info:
      path: Resources/Info.plist
    sources:
      - App
      - Authentication
      - Telematics
      - Dashboard
      - Models
      - Services
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pulseinsurance.telematics
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"      # iPhone only
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_NAME: PulseInsurance
        DEVELOPMENT_TEAM: ""             # Set your Apple Developer Team ID here
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    entitlements:
      path: PulseInsurance.entitlements
      properties:
        com.apple.developer.location.push: true

schemes:
  PulseInsurance:
    build:
      targets:
        PulseInsurance: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
